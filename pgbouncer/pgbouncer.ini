[databases]
; foodHubDb = host=127.0.0.1 port=5432 dbname=foodHubDb

; host=host.docker.internal → tells the container to reach your Windows PostgreSQL
foodHubDb = host=host.docker.internal port=5432 dbname=foodHubDb

[pgbouncer]
; listen_addr = 127.0.0.1

; listen_addr = 0.0.0.0 → tells PgBouncer to accept connections from anywhere 
; (not just localhost inside the container)
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = scram-sha-256
; auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# best for async apps — connection returned after each transaction
pool_mode = transaction

# your app can open up to 1000 connections to PgBouncer
max_client_conn = 1000 

# only 25 real PostgreSQL connections per database
default_pool_size = 25           
min_pool_size = 5
reserve_pool_size = 5
server_idle_timeout = 600


# Your app then connects to PgBouncer's port instead of PostgreSQL directly:
############################ Before: connects directly to PostgreSQL
# DATABASE_URL = "postgresql+asyncpg://user:pass@localhost:5432/mydb"

############################ After: connects to PgBouncer
# DATABASE_URL = "postgresql+asyncpg://user:pass@localhost:6432/mydb"


# The difference in practice:
############################ Without pooling:  100 users → 100 PostgreSQL connections → DB slows down
############################ With PgBouncer:   100 users → 100 PgBouncer connections → 25 PostgreSQL connections → DB happy