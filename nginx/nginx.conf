upstream fastapi_app {
    least_conn;                          # send to the least-busy worker
    server 127.0.0.1:8000;               # single entry point
    keepalive 32;                        # reuse connections — reduces overhead
}

server {
    listen 80;  # Start with HTTP first (no SSL for local testing)
    server_name localhost;

    location / {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # enable keepalive to upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}